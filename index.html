<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ryan Smith</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="description" content="Ryan Smith - DevOps Engineer in Irvine, CA">
  <meta name="author" content="Ryan Smith">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/themify-icons@0.1.2/css/themify-icons.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      min-height: 100vh;
    }
    .profile-section {
      padding: 80px 0;
    }
    .profile-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .profile-image {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #007bff;
    }
    .social-links a {
      color: #333;
      font-size: 24px;
      margin: 0 12px;
      transition: color 0.3s;
    }
    .social-links a:hover {
      color: #007bff;
    }
  </style>
</head>
<body>
  <section class="profile-section">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="profile-card p-5 text-center">
            <img src="images/author.jpg" alt="Ryan Smith" class="profile-image mb-4">
            <h1 class="mb-2">Ryan Smith</h1>
            <p class="text-muted mb-4">DevOps Engineer | Irvine, CA</p>
            <p class="lead mb-4">
              Expert DevOps engineer with experience in AWS, managing Kubernetes via Helmfile and writing Golang tooling.
            </p>
            <div class="social-links mb-4">
              <a href="https://twitter.com/rms1000watt" target="_blank" title="Twitter"><i class="ti-twitter-alt"></i></a>
              <a href="https://github.com/rms1000watt" target="_blank" title="GitHub"><i class="ti-github"></i></a>
              <a href="https://linkedin.com/in/ryanmatthewsmith" target="_blank" title="LinkedIn"><i class="ti-linkedin"></i></a>
            </div>
            <a href="https://github.com/rms1000watt" class="btn btn-primary btn-lg" target="_blank">View GitHub Profile</a>
          </div>
        </div>
      </div>
    </div>
  </section>
  <p>hello Ryan</p>

</html>
