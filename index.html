<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ryan Smith</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Ryan Smith - DevOps Engineer">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      max-width: 640px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .name {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .tagline {
      font-size: 1rem;
      color: #666;
      margin-bottom: 24px;
    }

    .bio {
      font-size: 1rem;
      color: #333;
      margin-bottom: 32px;
      max-width: 520px;
    }

    .links {
      display: flex;
      gap: 20px;
      margin-bottom: 60px;
      flex-wrap: wrap;
    }

    .links a {
      color: #1a1a1a;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .divider {
      border: none;
      border-top: 1px solid #e5e5e5;
      margin: 48px 0;
    }

    .sitemap-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #999;
      margin-bottom: 16px;
    }

    .sitemap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sitemap a {
      color: #1a1a1a;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .sitemap a:hover {
      text-decoration: underline;
    }

    .sitemap-group {
      margin-bottom: 8px;
    }

    .sitemap-group-title {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1a1a1a;
      font-size: 0.95rem;
    }

    .sitemap-group-title:hover {
      text-decoration: underline;
    }

    .sitemap-group-title .arrow {
      transition: transform 0.2s;
      font-size: 1rem;
      color: #666;
      margin-left: 2px;
    }

    .sitemap-group.open .arrow {
      transform: rotate(90deg);
    }

    .sitemap-group-items {
      display: none;
      padding-left: 20px;
      margin-top: 4px;
    }

    .sitemap-group.open .sitemap-group-items {
      display: block;
    }

    @media (min-width: 600px) {
      body {
        padding: 100px 40px;
      }
      .name {
        font-size: 2.25rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1 class="name">Ryan Smith</h1>
    <p class="tagline">Software / DevOps Engineer</p>
    <p class="bio">
      Golang · Bash · Typescript · Kubernetes · MongoDB · Postgres · AWS · Terraform · Terragrunt
    </p>
    <div class="links">
      <a href="https://github.com/rms1000watt" target="_blank">GitHub</a>
      <a href="https://linkedin.com/in/ryanmatthewsmith" target="_blank">LinkedIn</a>
    </div>

    <hr class="divider">

    <h2 class="sitemap-title">Site Map</h2>
    <nav class="sitemap">
      <div class="sitemap-group">
        <div class="sitemap-group-title" onclick="this.parentElement.classList.toggle('open')">
          friends/ <span class="arrow">▸</span>
        </div>
        <div class="sitemap-group-items">
          <a href="./friends/grand/">grand</a>
        </div>
      </div>
      <a href="./hello-world-tigerbeetle/">hello-world-tigerbeetle</a>
      <a href="./hello-world-pixijs/">hello-world-pixijs</a>
      <a href="./hello-world-stategraph/">hello-world-stategraph</a>
    </nav>
  </main>
</body>
</html>
