<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ryan Smith</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Press Start 2P', monospace;
      background: #87ceeb;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .box-3d {
      background: #c0c0c0;
      border: 4px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      box-shadow: 
        8px 8px 0 #404040,
        inset -4px -4px 0 #ffffff,
        inset 4px 4px 0 #808080;
    }

    .box-3d-inverted {
      background: #404040;
      border: 4px solid;
      border-color: #808080 #ffffff #ffffff #808080;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
      margin-bottom: 30px;
    }

    .title {
      font-size: 2.5rem;
      color: #ffd700;
      text-shadow: 
        4px 4px 0 #ff8c00,
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000;
      margin-bottom: 30px;
      line-height: 1.4;
    }

    .profile-container {
      display: inline-block;
      padding: 15px;
      background: #404040;
      border: 4px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      margin-bottom: 30px;
    }

    .profile-image {
      width: 200px;
      height: 200px;
      border: 4px solid #000;
      display: block;
      image-rendering: pixelated;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #00ff00;
      text-shadow: 2px 2px 0 #000;
      margin-bottom: 20px;
    }

    .bio {
      font-size: 0.6rem;
      color: #ffffff;
      text-shadow: 2px 2px 0 #000;
      line-height: 2;
      max-width: 600px;
      margin: 0 auto 30px;
    }

    .social-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .social-btn {
      display: inline-block;
      padding: 15px 25px;
      background: #ff0000;
      color: #fff;
      text-decoration: none;
      font-size: 0.7rem;
      border: 4px solid;
      border-color: #ff8080 #800000 #800000 #ff8080;
      box-shadow: 
        4px 4px 0 #800000,
        inset 2px 2px 0 #ff8080,
        inset -2px -2px 0 #800000;
      transition: all 0.1s;
    }

    .social-btn:hover {
      transform: translate(2px, 2px);
      box-shadow: 
        2px 2px 0 #800000,
        inset 2px 2px 0 #ff8080,
        inset -2px -2px 0 #800000;
    }

    .social-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 
        0 0 0 #800000,
        inset 2px 2px 0 #800000,
        inset -2px -2px 0 #ff8080;
    }

    .section-title {
      font-size: 1.2rem;
      color: #00ffff;
      text-shadow: 
        3px 3px 0 #008b8b,
        -2px -2px 0 #000;
      text-align: center;
      margin: 40px 0 30px;
    }

    .sitemap {
      padding: 30px;
      background: #2a2a2a;
      border: 6px solid #000;
    }

    .site-list {
      list-style: none;
    }

    .site-item {
      margin: 15px 0;
    }

    .site-link {
      display: inline-block;
      padding: 15px 20px;
      background: linear-gradient(180deg, #4169e1 0%, #1e3a8a 100%);
      color: #fff;
      text-decoration: none;
      font-size: 0.7rem;
      border: 4px solid;
      border-color: #6b8dd6 #1e3a8a #1e3a8a #6b8dd6;
      box-shadow: 
        4px 4px 0 #000,
        inset 2px 2px 0 rgba(255,255,255,0.2);
    }

    .site-link:hover {
      background: linear-gradient(180deg, #5179f1 0%, #2e4aa0 100%);
    }

    .site-link:active {
      transform: translate(4px, 4px);
      box-shadow: none;
      border-color: #1e3a8a #6b8dd6 #6b8dd6 #1e3a8a;
    }

    .polygon-decoration {
      position: fixed;
      width: 0;
      height: 0;
      opacity: 0.3;
      z-index: -1;
    }

    .poly-1 {
      top: 10%;
      left: 5%;
      border-left: 60px solid transparent;
      border-right: 60px solid transparent;
      border-bottom: 100px solid #ff6b6b;
    }

    .poly-2 {
      top: 30%;
      right: 10%;
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
      border-bottom: 70px solid #4ecdc4;
    }

    .poly-3 {
      bottom: 20%;
      left: 15%;
      border-left: 50px solid transparent;
      border-right: 50px solid transparent;
      border-bottom: 80px solid #ffe66d;
    }

    .poly-4 {
      bottom: 10%;
      right: 5%;
      border-left: 70px solid transparent;
      border-right: 70px solid transparent;
      border-bottom: 120px solid #95e1d3;
    }

    .health-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 30px;
    }

    .heart {
      font-size: 1.5rem;
      color: #ff0000;
      text-shadow: 2px 2px 0 #800000;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .floating {
      animation: float 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="poly-1 floating"></div>
  <div class="poly-2 floating" style="animation-delay: 0.5s;"></div>
  <div class="poly-3 floating" style="animation-delay: 1s;"></div>
  <div class="poly-4 floating" style="animation-delay: 1.5s;"></div>

  <div class="container">
    <section class="hero box-3d">
      <h1 class="title">RYAN SMITH</h1>
      
      <div class="profile-container">
        <img src="images/author.jpg" alt="Ryan Smith" class="profile-image">
      </div>
      
      <p class="subtitle">DEVOPS ENGINEER</p>
      
      <p class="bio">
        EXPERT DEVOPS ENGINEER WITH EXPERIENCE IN AWS,<br>
        MANAGING KUBERNETES VIA HELMFILE AND<br>
        WRITING GOLANG TOOLING.
      </p>
      
      <div class="social-row">
        <a href="https://twitter.com/rms1000watt" class="social-btn" target="_blank">TWITTER</a>
        <a href="https://github.com/rms1000watt" class="social-btn" target="_blank">GITHUB</a>
        <a href="https://linkedin.com/in/ryanmatthewsmith" class="social-btn" target="_blank">LINKEDIN</a>
      </div>

      <div class="health-bar">
        <span class="heart">♥</span>
        <span class="heart">♥</span>
        <span class="heart">♥</span>
      </div>
    </section>

    <h2 class="section-title">★ SITE MAP ★</h2>

    <section class="sitemap box-3d-inverted">
      <ul class="site-list">
        <li class="site-item">
          <a href="./hello-world-tigerbeetle/" class="site-link">HELLO-WORLD-TIGERBEETLE/</a>
        </li>
        <li class="site-item">
          <a href="./hello-world-pixijs/" class="site-link">HELLO-WORLD-PIXIS/</a>
        </li>
        <li class="site-item">
          <a href="./hello-world-stategraph/" class="site-link">HELLO-WORLD-STATEGRAPH/</a>
        </li>
      </ul>
    </section>
  </div>
</body>
</html>
