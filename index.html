<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ryan Smith</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Press Start 2P', monospace;
      background: #87ceeb;
      transition: background 0.3s;
    }

    body.kawaii {
      background: linear-gradient(135deg, #ffb6c1 0%, #ffc0cb 50%, #fff0f5 100%);
    }

    body.win95 {
      background: #008080;
      font-family: 'MS Sans Serif', 'Segoe UI', Tahoma, sans-serif;
    }

    body.win95 * {
      font-family: 'MS Sans Serif', 'Segoe UI', Tahoma, sans-serif;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 10px;
    }

    .box-3d {
      background: #c0c0c0;
      border: 3px solid;
      border-color: #fff #808080 #808080 #fff;
      box-shadow: 4px 4px 0 #404040;
      padding: 15px;
      margin-bottom: 15px;
      transition: all 0.3s;
    }

    body.kawaii .box-3d {
      background: rgba(255, 255, 255, 0.9);
      border: 4px solid #ff69b4;
      box-shadow: 0 8px 32px rgba(255, 105, 180, 0.3);
      border-radius: 30px;
    }

    body.win95 .box-3d {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #000;
      padding: 2px;
    }

    body.win95 .box-3d-inverted {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #000;
    }

    body.win95 .win95-window {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      box-shadow: inset 1px 1px 0 #dfdfdf, inset -1px -1px 0 #000;
    }

    body.win95 .win95-titlebar {
      background: linear-gradient(90deg, #000080, #1084d0);
      color: #fff;
      padding: 3px 4px;
      font-size: 12px;
      font-weight: bold;
      margin: -2px -2px 2px -2px;
    }

    body.win95 .win95-content {
      padding: 8px;
      background: #fff;
      border: 2px solid;
      border-color: #808080 #fff #fff #808080;
    }

    .box-3d-inverted {
      background: #404040;
      border: 3px solid;
      border-color: #808080 #fff #fff #808080;
      padding: 15px;
      transition: all 0.3s;
    }

    body.kawaii .box-3d-inverted {
      background: rgba(255, 255, 255, 0.8);
      border: 4px solid #ffb6c1;
      border-radius: 25px;
    }

    body.win95 .box-3d-inverted {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
    }

    .hero { text-align: center; }

    .title {
      font-size: 1.2rem;
      color: #ffd700;
      text-shadow: 2px 2px 0 #ff8c00, -1px -1px 0 #000;
      margin-bottom: 10px;
      line-height: 1.4;
      transition: all 0.3s;
    }

    body.kawaii .title {
      font-size: 1.5rem;
      color: #ff69b4;
      text-shadow: 4px 4px 0 #ffb6c1, -2px -2px 0 #fff;
      letter-spacing: 2px;
    }

    body.win95 .title {
      font-size: 18px;
      color: #000;
      text-shadow: none;
      font-weight: bold;
    }

    body.win95 .subtitle {
      font-size: 12px;
      color: #000080;
      text-shadow: none;
    }

    body.win95 .bio {
      font-size: 11px;
      color: #000;
      text-shadow: none;
      line-height: 1.5;
    }

    .profile-image {
      width: 100px;
      height: 100px;
      border: 3px solid #000;
      display: inline-block;
      image-rendering: pixelated;
      margin-bottom: 10px;
      transition: all 0.3s;
    }

    body.kawaii .profile-image {
      border-radius: 50%;
      border: 5px solid #ff69b4;
      box-shadow: 0 0 20px #ffb6c1;
    }

    .subtitle {
      font-size: 0.5rem;
      color: #00ff00;
      text-shadow: 1px 1px 0 #000;
      margin-bottom: 10px;
      transition: all 0.3s;
    }

    body.kawaii .subtitle {
      font-size: 0.9rem;
      color: #ff69b4;
      text-shadow: 2px 2px 0 #fff;
    }

    body.win95 .profile-image {
      border: 2px solid;
      border-color: #808080 #fff #fff #808080;
    }

    body.kawaii .bio {
      font-size: 1rem;
      color: #d87093;
      text-shadow: 1px 1px 0 #fff;
    }

    body.win95 .social-btn {
      background: #c0c0c0;
      color: #000;
      border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      box-shadow: 1px 1px 0 #000;
      font-size: 11px;
      padding: 4px 12px;
    }

    body.win95 .social-btn:active {
      border-color: #808080 #fff #fff #808080;
      box-shadow: none;
    }

    .bio {
      font-size: 0.45rem;
      color: #fff;
      text-shadow: 1px 1px 0 #000;
      line-height: 1.8;
      margin-bottom: 15px;
      transition: all 0.3s;
    }

    .social-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .social-btn {
      padding: 8px 12px;
      background: #ff0000;
      color: #fff;
      text-decoration: none;
      font-size: 0.5rem;
      border: 3px solid;
      border-color: #ff8080 #800000 #800000 #ff8080;
      box-shadow: 2px 2px 0 #800000;
      transition: all 0.3s;
    }

    body.kawaii .social-btn {
      background: linear-gradient(180deg, #ff69b4 0%, #ff1493 100%);
      border-color: #ffb6c1 #c71585 #c71585 #ffb6c1;
      box-shadow: 3px 3px 0 #ff69b4;
      border-radius: 20px;
    }

    .theme-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 10px 15px;
      background: #ffd700;
      color: #000;
      border: 3px solid;
      border-color: #ffec8b #daa520 #daa520 #ffec8b;
      box-shadow: 2px 2px 0 #000;
      font-size: 0.5rem;
      cursor: pointer;
      z-index: 1000;
      transition: all 0.3s;
    }

    body.kawaii .theme-btn {
      background: linear-gradient(180deg, #ff69b4 0%, #ff1493 100%);
      color: #fff;
      border-color: #ffb6c1 #c71585 #c71585 #ffb6c1;
      border-radius: 15px;
      box-shadow: 3px 3px 0 #ffb6c1;
    }

    .section-title {
      font-size: 0.7rem;
      color: #00ffff;
      text-shadow: 2px 2px 0 #008b8b;
      text-align: center;
      margin: 15px 0 10px;
      transition: all 0.3s;
    }

    body.kawaii .section-title {
      font-size: 1rem;
      color: #ff69b4;
      text-shadow: 2px 2px 0 #ffb6c1;
    }

    body.win95 .section-title {
      font-size: 14px;
      color: #000;
      text-shadow: none;
      background: #c0c0c0;
      padding: 4px 8px;
      border: 2px solid;
      border-color: #808080 #fff #fff #808080;
      display: inline-block;
    }

    .site-list { list-style: none; }

    .site-link {
      color: #00ffff;
      text-decoration: none;
      font-size: 0.5rem;
      padding: 4px 0;
      display: block;
      transition: all 0.3s;
    }

    .site-link:hover { color: #ffd700; }

    body.kawaii .site-link {
      color: #ff69b4;
      font-size: 0.9rem;
    }

    body.kawaii .site-link:hover { color: #ff1493; }

    body.win95 .site-link {
      color: #0000ff;
      font-size: 11px;
      text-decoration: underline;
    }

    body.win95 .site-link:hover { color: #ff0000; }

    body.win95 .theme-btn {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      box-shadow: 1px 1px 0 #000;
      font-size: 11px;
      color: #000;
    }

    body.win95 .theme-btn:active {
      border-color: #808080 #fff #fff #808080;
      box-shadow: none;
    }

    .poly-1, .poly-2, .poly-3, .poly-4 {
      display: none;
    }

    .heart {
      font-size: 1rem;
      color: #ff0000;
      text-shadow: 1px 1px 0 #800000;
      transition: all 0.3s;
    }

    body.kawaii .heart {
      color: #ff69b4;
      text-shadow: 2px 2px 0 #ffb6c1;
    }

    .health-bar { margin-top: 10px; }

    body.kawaii .kawaii-deco {
      display: block;
      position: fixed;
      font-size: 2rem;
      opacity: 0.3;
      z-index: -1;
      animation: bounce 1s infinite;
    }

    body.kawaii .kawaii-deco.star1 { top: 10%; left: 5%; content: "★"; }
    body.kawaii .kawaii-deco.heart1 { top: 30%; right: 10%; }
    body.kawaii .kawaii-deco.star2 { bottom: 20%; left: 15%; }
    body.kawaii .kawaii-deco.heart2 { bottom: 10%; right: 5%; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    body.kawaii .kawaii-deco {
      display: block;
    }

    @media (min-width: 600px) {
      .title { font-size: 1.8rem; }
      .profile-image { width: 150px; height: 150px; }
      .subtitle { font-size: 0.7rem; }
      .bio { font-size: 0.55rem; }
      .social-btn { padding: 12px 20px; font-size: 0.6rem; }
      .site-link { font-size: 0.55rem; }
      .box-3d { padding: 30px; margin-bottom: 20px; }
      .box-3d-inverted { padding: 20px; }
      .section-title { font-size: 0.9rem; margin: 20px 0 15px; }
      .poly-1, .poly-2, .poly-3, .poly-4 {
        display: block;
        position: fixed;
        width: 0;
        height: 0;
        opacity: 0.3;
        z-index: -1;
      }
      .poly-1 { top: 10%; left: 5%; border-left: 40px solid transparent; border-right: 40px solid transparent; border-bottom: 70px solid #ff6b6b; }
      .poly-2 { top: 30%; right: 10%; border-left: 30px solid transparent; border-right: 30px solid transparent; border-bottom: 50px solid #4ecdc4; }
      .poly-3 { bottom: 20%; left: 15%; border-left: 35px solid transparent; border-right: 35px solid transparent; border-bottom: 60px solid #ffe66d; }
      .poly-4 { bottom: 10%; right: 5%; border-left: 45px solid transparent; border-right: 45px solid transparent; border-bottom: 80px solid #95e1d3; }
    }
  </style>
</head>
<body>
  <button class="theme-btn" onclick="toggleTheme()">THEME</button>
  <span class="kawaii-deco star1">☆</span>
  <span class="kawaii-deco heart1">♡</span>
  <span class="kawaii-deco star2">✿</span>
  <span class="kawaii-deco heart2">♪</span>

  <div class="container">
    <section class="hero box-3d win95-window">
      <div class="win95-titlebar">Ryan Smith</div>
      <div class="win95-content">
        <h1 class="title">RYAN SMITH</h1>
        <img src="images/author.jpg" alt="Ryan Smith" class="profile-image">
        <p class="subtitle">DevOps Engineer</p>
        <p class="bio">Expert DevOps Engineer with experience in AWS, managing Kubernetes via Helmfile and writing Golang tooling.</p>
        <div class="social-row">
          <a href="https://twitter.com/rms1000watt" class="social-btn" target="_blank">Twitter</a>
          <a href="https://github.com/rms1000watt" class="social-btn" target="_blank">GitHub</a>
          <a href="https://linkedin.com/in/ryanmatthewsmith" class="social-btn" target="_blank">LinkedIn</a>
        </div>
        <div class="health-bar">
          <span class="heart">♥</span><span class="heart">♥</span><span class="heart">♥</span>
        </div>
      </div>
    </section>

    <h2 class="section-title">SITE MAP</h2>

    <div class="box-3d-inverted win95-window">
      <div class="win95-titlebar">Directory</div>
      <div class="win95-content">
    <ul class="site-list">
      <li><a href="./grand/" class="site-link">grand/</a></li>
      <li><a href="./hello-world-tigerbeetle/" class="site-link">hello-world-tigerbeetle/</a></li>
      <li><a href="./hello-world-pixijs/" class="site-link">hello-world-pixijs/</a></li>
      <li><a href="./hello-world-stategraph/" class="site-link">hello-world-stategraph/</a></li>
    </ul>
      </div>
    </div>
  </div>

  <script>
    const themes = ['', 'kawaii', 'win95'];
    let currentTheme = 0;

    function toggleTheme() {
      document.body.classList.remove(...themes);
      currentTheme = (currentTheme + 1) % themes.length;
      if (themes[currentTheme]) {
        document.body.classList.add(themes[currentTheme]);
      }
    }
  </script>
</body>
</html>
