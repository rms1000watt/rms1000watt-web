<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ryan Smith</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="description" content="Ryan Smith - DevOps Engineer in Irvine, CA">
  <meta name="author" content="Ryan Smith">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/themify-icons@0.1.2/css/themify-icons.css">
  <style>
    :root {
      --primary: #2563eb;
      --dark: #1e293b;
      --light: #f1f5f9;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--light);
      margin: 0;
      padding: 0;
    }
    .hero {
      min-height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      color: white;
      padding: 60px 20px;
    }
    .hero-content {
      text-align: center;
      max-width: 700px;
    }
    .profile-image {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--primary);
      margin-bottom: 24px;
    }
    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .hero .subtitle {
      font-size: 1.25rem;
      color: #94a3b8;
      margin-bottom: 24px;
    }
    .hero .bio {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #cbd5e1;
      margin-bottom: 32px;
    }
    .social-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 20px;
      margin: 0 8px;
      transition: all 0.3s;
    }
    .social-links a:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-3px);
    }
    .sitemap {
      padding: 60px 20px;
    }
    .sitemap h2 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 32px;
    }
    .sitemap ul {
      list-style: none;
      padding: 0;
      max-width: 600px;
      margin: 0 auto;
    }
    .sitemap li {
      padding: 8px 0;
      border-bottom: 1px solid #e2e8f0;
    }
    .sitemap a {
      color: var(--primary);
      text-decoration: none;
    }
    .sitemap a:hover {
      text-decoration: underline;
    }
    footer {
      text-align: center;
      padding: 32px;
      color: #64748b;
      font-size: 0.9rem;
      border-top: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-content">
      <img src="images/author.jpg" alt="Ryan Smith" class="profile-image">
      <h1>Ryan Smith</h1>
      <p class="subtitle">DevOps Engineer | Irvine, CA</p>
      <p class="bio">
        Expert DevOps engineer with experience in AWS, managing Kubernetes via Helmfile and writing Golang tooling.
      </p>
      <div class="social-links">
        <a href="https://twitter.com/rms1000watt" target="_blank" title="Twitter"><i class="ti-twitter-alt"></i></a>
        <a href="https://github.com/rms1000watt" target="_blank" title="GitHub"><i class="ti-github"></i></a>
        <a href="https://linkedin.com/in/ryanmatthewsmith" target="_blank" title="LinkedIn"><i class="ti-linkedin"></i></a>
      </div>
    </div>
  </section>

  <section class="sitemap">
    <h2>Site Map</h2>
    <ul>
      <li><a href="./hello-world-tigerbeetle/">hello-world-tigerbeetle/</a></li>
      <li><a href="./hello-world-pixijs/">hello-world-pixijs/</a></li>
      <li><a href="./hello-world-stategraph/">hello-world-stategraph/</a></li>
    </ul>
  </section>

  <footer>
  </footer>
</body>
</html>
