<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ryan Smith</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="description" content="Ryan Smith - DevOps Engineer in Irvine, CA">
  <meta name="author" content="Ryan Smith">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/themify-icons@0.1.2/css/themify-icons.css">
  <style>
    :root {
      --primary: #2563eb;
      --dark: #1e293b;
      --light: #f1f5f9;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--light);
      margin: 0;
      padding: 0;
    }
    .hero {
      min-height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      color: white;
      padding: 60px 20px;
    }
    .hero-content {
      text-align: center;
      max-width: 700px;
    }
    .profile-image {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--primary);
      margin-bottom: 24px;
    }
    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .hero .subtitle {
      font-size: 1.25rem;
      color: #94a3b8;
      margin-bottom: 24px;
    }
    .hero .bio {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #cbd5e1;
      margin-bottom: 32px;
    }
    .social-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 20px;
      margin: 0 8px;
      transition: all 0.3s;
    }
    .social-links a:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-3px);
    }
    .browser {
      max-width: 600px;
      margin: 40px auto;
      background: #c0c0c0;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      padding: 2px;
    }
    .browser-titlebar {
      background: linear-gradient(90deg, #000080, #1084d0);
      color: white;
      padding: 4px 6px;
      font-size: 12px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .browser-buttons span {
      display: inline-block;
      width: 16px;
      height: 14px;
      background: #c0c0c0;
      border: 1px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      text-align: center;
      line-height: 12px;
      font-size: 10px;
      color: black;
      margin-left: 2px;
      cursor: pointer;
    }
    .browser-toolbar {
      background: #c0c0c0;
      border-bottom: 1px solid #808080;
      padding: 4px;
      font-size: 11px;
    }
    .browser-content {
      background: white;
      border: 2px solid;
      border-color: #808080 #ffffff #ffffff #808080;
      padding: 4px;
      min-height: 200px;
    }
    .tree {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 8px;
      line-height: 1.6;
    }
    .tree-item {
      padding: 2px 0;
      color: #000080;
      text-decoration: none;
    }
    .tree-item:hover {
      background: #000080;
      color: white;
    }
    .tree-folder {
      color: #808080;
    }
    .tree-line {
      color: #808080;
    }
    footer {
      text-align: center;
      padding: 32px;
      color: #64748b;
      font-size: 0.9rem;
      border-top: 1px solid #e2e8f0;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-content">
      <img src="images/author.jpg" alt="Ryan Smith" class="profile-image">
      <h1>Ryan Smith</h1>
      <p class="subtitle">DevOps Engineer | Irvine, CA</p>
      <p class="bio">
        Expert DevOps engineer with experience in AWS, managing Kubernetes via Helmfile and writing Golang tooling.
      </p>
      <div class="social-links">
        <a href="https://twitter.com/rms1000watt" target="_blank" title="Twitter"><i class="ti-twitter-alt"></i></a>
        <a href="https://github.com/rms1000watt" target="_blank" title="GitHub"><i class="ti-github"></i></a>
        <a href="https://linkedin.com/in/ryanmatthewsmith" target="_blank" title="LinkedIn"><i class="ti-linkedin"></i></a>
      </div>
    </div>
  </section>

  <section class="sites">
    <div class="browser">
      <div class="browser-titlebar">
        <span>Directory Listing</span>
        <div class="browser-buttons">
          <span>_</span><span>□</span><span>×</span>
        </div>
      </div>
      <div class="browser-toolbar">C:\RMS1000WATT\</div>
      <div class="browser-content">
        <div class="tree">
          <span class="tree-folder">📁 <a href="./hello-world-tigerbeetle/" class="tree-item">hello-world-tigerbeetle/</a></span><br>
          <span class="tree-folder">📁 <a href="./hello-world-pixijs/" class="tree-item">hello-world-pixijs/</a></span><br>
          <span class="tree-folder">📁 <a href="./hello-world-stategraph/" class="tree-item">hello-world-stategraph/</a></span>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p>hello Ryan</p>
  </footer>
</body>
</html>
