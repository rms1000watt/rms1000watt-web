<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Hello World PixiJS</title>
        <script src="https://pixijs.download/release/pixi.min.js"></script>
        <style>
            body { font-family: -apple-system, sans-serif; margin: 0; background: #f1f5f9; }
            .header { padding: 20px; background: #1e293b; color: white; }
            .header a { color: #60a5fa; }
            .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        </style>
    </head>
    <body>
        <div class="header">
            <a href="../">&larr; Back to Home</a>
        </div>
        <div class="container">
            <h1>Hello World PixiJS</h1>
            <p>A simple example using PixiJS for 2D graphics rendering.</p>
            <p>Run with: <code>tsx main.ts</code></p>
        </div>
        <script type="module">
            const app = new PIXI.Application();
            await app.init({ width: 640, height: 360 })
            document.body.appendChild(app.canvas);

            await PIXI.Assets.load('https://pixijs.com/assets/flowerTop.png');
            let sprite = PIXI.Sprite.from('https://pixijs.com/assets/flowerTop.png');
            app.stage.addChild(sprite);

            await PIXI.Assets.load('https://pixijs.com/assets/bitmap-font/desyrel.xml');
            const bitmapFontText = new PIXI.BitmapText({
                text: 'I love you! <3\nGo to Sleep!',
                style: {
                    fontFamily: 'Desyrel',
                    fontSize: 55,
                    align: 'left',
                    background: 255,
                },
            });

            bitmapFontText.x = 50;
            bitmapFontText.y = 200;

            app.stage.addChild(bitmapFontText);

            let elapsed = 0.0;
            app.ticker.add((ticker) => {
                elapsed += ticker.deltaTime;
                sprite.x = 100.0 + Math.cos(elapsed/50.0) * 100.0;
            });
        </script>
    </body>
</html>
